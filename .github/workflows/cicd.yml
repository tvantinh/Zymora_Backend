name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/mutilservicesplatform
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        working-directory: Zymora
        run: dotnet restore Zymora.sln

      - name: Build
        working-directory: Zymora
        run: dotnet build Zymora.sln -c Release --no-restorelease
      
      - name: Run tests
        working-directory: Zymora
        run: dotnet test Zymora.sln -c Release --no-build --configuration Release --verbosity normal

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Build Docker image
        run: docker build -f Zymora/Dockerfile -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ env.IMAGE_TAG }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'table'
        continue-on-error: true